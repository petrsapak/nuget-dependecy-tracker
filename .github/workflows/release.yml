name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore

      - name: Publish
        run: >
          dotnet publish src/NuGetDependencyMapper
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}

      - name: Zip (Windows)
        if: matrix.rid == 'win-x64'
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath nuget-dependency-mapper-${{ matrix.rid }}.zip
        shell: pwsh

      - name: Zip (Linux/macOS)
        if: matrix.rid != 'win-x64'
        run: cd publish/${{ matrix.rid }} && zip -r ../../nuget-dependency-mapper-${{ matrix.rid }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-dependency-mapper-${{ matrix.rid }}
          path: nuget-dependency-mapper-${{ matrix.rid }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip
